<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolomites Itinerary — Sept 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  :root {
    --cream: #f4f0e8;
    --ink: #1a1814;
    --pine: #2d4a3e;
    --stone: #8a7e6e;
    --gold: #c9a84c;
    --mist: #ddd8cc;
    --snow: #faf8f4;
    --accent: #4a7c6f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    background: var(--pine);
    color: var(--cream);
    padding: 1.25rem 2rem 1rem;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 50%;
  }
  header::after {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
  }
  .header-label {
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.25rem;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 3vw, 1.9rem);
    font-weight: 700;
    line-height: 1.15;
  }
  header h1 em { font-style: italic; color: var(--gold); }
  .header-dates {
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    color: rgba(244,240,232,0.55);
    margin-top: 0.3rem;
  }

  .container {
    display: grid;
    grid-template-columns: 320px 1fr;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    background: var(--snow);
    border-right: 1px solid var(--mist);
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: var(--mist); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--stone); border-radius: 2px; }

  .day-group { border-bottom: 1px solid var(--mist); }

  .day-header {
    padding: 0.85rem 1.25rem 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: background 0.15s;
    user-select: none;
    position: sticky;
    top: 0;
    background: var(--snow);
    z-index: 2;
  }
  .day-header:hover { background: var(--mist); }
  .day-header.active { background: var(--pine); color: var(--cream); }
  .day-header.active .day-label { color: var(--gold); }
  .day-header.active .day-title { color: var(--cream); }
  .day-header.active .day-date { color: rgba(244,240,232,0.55); }
  .day-header.active .day-dot { background: var(--gold); color: var(--ink); }

  .day-dot {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--pine);
    color: var(--cream);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    font-weight: 500;
    flex-shrink: 0;
  }
  .day-label { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); display: block; }
  .day-title { font-family: 'Playfair Display', serif; font-size: 0.88rem; color: var(--ink); display: block; line-height: 1.2; }
  .day-date { font-size: 0.57rem; color: var(--stone); display: block; margin-top: 0.1rem; }

  .stops-list { padding: 0 0 0.5rem; display: none; }
  .stops-list.open { display: block; }

  .stop-item {
    padding: 0.55rem 1.25rem 0.55rem 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
    transition: background 0.1s;
    border-left: 3px solid transparent;
  }
  .stop-item:hover { background: rgba(45,74,62,0.06); }
  .stop-item.active { border-left-color: var(--gold); background: rgba(201,168,76,0.08); }

  .stop-time { font-size: 0.58rem; color: var(--stone); white-space: nowrap; min-width: 50px; padding-top: 2px; }
  .stop-name { font-size: 0.76rem; font-weight: 500; color: var(--ink); line-height: 1.3; }
  .stop-type { font-size: 0.58rem; color: var(--stone); margin-top: 0.1rem; }
  .stop-optional {
    font-size: 0.54rem; background: var(--gold); color: var(--ink);
    padding: 1px 4px; border-radius: 2px; margin-left: 0.3rem;
    vertical-align: middle;
  }
  .stop-drive { font-size: 0.58rem; color: var(--accent); margin-top: 0.1rem; }
  .stop-accommodation {
    font-size: 0.58rem; color: var(--pine); margin-top: 0.1rem;
    font-weight: 500;
  }

  .map-container { position: relative; }
  #map { width: 100%; height: 100%; z-index: 1; }

  .info-panel {
    position: absolute;
    bottom: 1.5rem; right: 1.5rem;
    background: var(--snow);
    border: 1px solid var(--mist);
    padding: 1rem 1.3rem;
    width: 270px;
    box-shadow: 0 4px 24px rgba(26,24,20,0.14);
    z-index: 999;
    display: none;
  }
  .info-panel.visible { display: block; }
  .info-panel-label { font-size: 0.54rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.2rem; }
  .info-panel-name { font-family: 'Playfair Display', serif; font-size: 1rem; margin-bottom: 0.2rem; line-height: 1.2; }
  .info-panel-time { font-size: 0.63rem; color: var(--stone); margin-bottom: 0.4rem; }
  .info-panel-desc { font-size: 0.68rem; color: var(--stone); line-height: 1.6; border-top: 1px solid var(--mist); padding-top: 0.4rem; }
  .info-panel-address { font-size: 0.63rem; color: var(--pine); margin-top: 0.4rem; border-top: 1px solid var(--mist); padding-top: 0.4rem; line-height: 1.5; }
  .info-panel-close {
    position: absolute; top: 0.6rem; right: 0.7rem;
    background: none; border: none; cursor: pointer;
    font-size: 0.9rem; color: var(--stone);
  }

  .legend {
    position: absolute; top: 1rem; right: 1rem;
    background: var(--snow); border: 1px solid var(--mist);
    padding: 0.65rem 0.9rem; font-size: 0.62rem; z-index: 999;
  }
  .legend-title { letter-spacing: 0.15em; text-transform: uppercase; color: var(--stone); margin-bottom: 0.4rem; font-size: 0.54rem; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.25rem; color: var(--ink); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* Airbnb pin marker */
  .airbnb-pin {
    background: var(--pine);
    color: var(--cream);
    font-size: 0.55rem;
    font-family: 'DM Mono', monospace;
    padding: 3px 6px;
    border-radius: 3px;
    white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  @media (max-width: 700px) {
    .container { grid-template-columns: 1fr; grid-template-rows: 45vh 1fr; }
    .sidebar { max-height: 45vh; order: 2; }
    .map-container { order: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="header-label">Road Trip — Italian Dolomites</div>
  <h1>Six Days in <em>The Alps</em></h1>
  <div class="header-dates">06 — 11 September 2026 &nbsp;·&nbsp; London → Venice → London</div>
</header>

<div class="container">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="map-container">
    <div id="map"></div>
    <div class="legend">
      <div class="legend-title">Days</div>
      <div id="legend-items"></div>
    </div>
    <div class="info-panel" id="infoPanel">
      <button class="info-panel-close" onclick="closeInfo()">✕</button>
      <div class="info-panel-label" id="infoDayLabel"></div>
      <div class="info-panel-name" id="infoName"></div>
      <div class="info-panel-time" id="infoTime"></div>
      <div class="info-panel-desc" id="infoDesc"></div>
      <div class="info-panel-address" id="infoAddress" style="display:none"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

const AIRBNBS = [
  {
    id: 'airbnb1',
    name: "Airbnb — Cortina",
    address: "Via del Castello, 18\nCortina d'Ampezzo, Veneto 32043",
    checkin: "Check-in from 5pm",
    nights: "Sun 06 – Tue 08 Sept",
    lat: 46.54164,
    lng: 12.13461,
  },
  {
    id: 'airbnb2',
    name: "Airbnb — Merano",
    address: "Via Karl Wolf, 1\nMerano, Trentino-Alto Adige 39012",
    checkin: "Check-in from 4pm",
    nights: "Tue 08 – Thu 10 Sept",
    lat: 46.67469,
    lng: 11.15881,
  },
];

const DAY_COLORS = {
  0: '#2d4a3e',
  1: '#c9a84c',
  2: '#4a7c6f',
  3: '#7a5c3e',
  4: '#5c6b8a',
  5: '#8a4a4a',
};

const DAYS = [
  {
    id: 0, day: 'Sun', date: '06 Sept',
    title: 'Arrival Day', subtitle: 'Venice → Braies → Cortina',
    stops: [
      { time: '07:15', name: 'London Departure', type: 'Flight ✈', lat: 51.4700, lng: -0.4543, desc: 'Early morning flight from London.', drive: null },
      { time: '~10:30', name: 'Venice Marco Polo Airport', type: 'Land & collect hire car', lat: 45.5047, lng: 12.3466, desc: 'Land, collect bags, pick up hire car. Allow ~1hr.', drive: null },
      { time: '~14:00', name: 'Lago di Braies', type: 'Scenic stop — pre-book parking', lat: 46.6943, lng: 12.0854, desc: 'Arrive before the 4pm access restriction lifts. Pre-book parking in advance — restrictions run until 15 Sept. Golden afternoon light on the lake.', drive: '~2.5hr from Venice' },
      { time: 'from 5pm', name: "Airbnb — Cortina d'Ampezzo", type: 'Check-in · Via del Castello, 18', lat: 46.54164, lng: 12.13461, desc: "Check-in from 5pm. Via del Castello, 18, Cortina d'Ampezzo.", drive: '~45min from Braies', address: "Via del Castello, 18\nCortina d'Ampezzo, Veneto 32043\n\nCheck-in from 5pm\nStaying: Sun 06 – Tue 08 Sept" },
    ]
  },
  {
    id: 1, day: 'Mon', date: '07 Sept',
    title: 'Tre Cime Day', subtitle: 'Misurina + Tre Cime + Cadini + Passo Giau',
    stops: [
      { time: '~08:30', name: 'Lago di Misurina', type: 'En route scenic stop', lat: 46.5826, lng: 12.2544, desc: 'Beautiful alpine lake on the road to Rifugio Auronzo. Easy 20–30 min stop. The Tre Cime peaks reflect in the water on clear mornings.', drive: '~45min from Cortina' },
      { time: '~09:30', name: 'Rifugio Auronzo — Tre Cime', type: 'Hike — pre-book toll road parking', lat: 46.6122, lng: 12.2962, desc: 'Pre-booking is mandatory — without a reservation you will be turned away at the toll gate. The iconic 10–11km loop around the three peaks. Allow 3.5–4hrs.', drive: '~20min from Misurina' },
      { time: '~14:00', name: 'Cadini di Misurina', type: 'Hike — same car park', lat: 46.6050, lng: 12.3050, desc: 'From the same Rifugio Auronzo car park. Short 2km round-trip to the famous jagged ridge viewpoint. Allow 1–1.5hrs.', drive: 'Same car park' },
      { time: '~18:00', name: 'Passo Giau', type: 'Sunset — Optional', lat: 46.4831, lng: 12.0542, desc: 'One of the most scenic passes in the Dolomites. 360° panoramic views. Only attempt if energy allows after the full day.', drive: '~50min from Auronzo', optional: true },
      { time: '~19:30', name: "Return — Cortina Airbnb", type: 'Back to base', lat: 46.54164, lng: 12.13461, desc: "Return to the Airbnb. Well-earned dinner in Cortina.", drive: '~30min from Passo Giau' },
    ]
  },
  {
    id: 2, day: 'Tue', date: '08 Sept',
    title: 'Lago di Sorapis', subtitle: 'Cortina → Sorapis → Merano',
    stops: [
      { time: '~08:00', name: 'Lago di Sorapis Trailhead', type: 'Hike — start early', lat: 46.5561, lng: 12.2046, desc: 'One of the most dramatic hikes near Cortina. Turquoise glacial lake surrounded by sheer cliffs. ~12km round trip, 4–5hrs. Some exposed sections with ropes — proper boots essential.', drive: '~20min from Cortina' },
      { time: '~13:30', name: "Cortina d'Ampezzo", type: 'Collect bags / lunch', lat: 46.5378, lng: 12.1359, desc: 'Return to collect bags from the Airbnb. Grab lunch before the drive west.', drive: '~20min from trailhead' },
      { time: 'from 4pm', name: 'Airbnb — Merano', type: 'Check-in · Via Karl Wolf, 1', lat: 46.67469, lng: 11.15881, desc: 'Check-in from 4pm. Via Karl Wolf, 1, Merano. Dinner in town — explore the historic centre.', drive: '~2hrs from Cortina', address: "Via Karl Wolf, 1\nMerano, Trentino-Alto Adige 39012\n\nCheck-in from 4pm\nStaying: Tue 08 – Thu 10 Sept" },
    ]
  },
  {
    id: 3, day: 'Wed', date: '09 Sept',
    title: 'Seceda', subtitle: 'Merano → Ortisei → Val di Funes → Merano',
    stops: [
      { time: '~08:00', name: 'Drive to Ortisei', type: 'Base: Merano', lat: 46.5748, lng: 11.6711, desc: '~1hr drive from Merano to Ortisei. Arrive in time for first cable car up.', drive: '~1hr from Merano' },
      { time: '~09:15', name: 'Seceda Cable Car', type: 'Cable car — buy tickets in advance', lat: 46.5765, lng: 11.6749, desc: 'Two-stage cable car from Ortisei up to Seceda ridge (2,519m). Iconic jagged Geisler peaks backdrop. Book tickets online — queues can be long. Allow a full morning up top.', drive: 'Walking distance in Ortisei' },
      { time: '~14:00', name: 'Ortisei', type: 'Lunch in town', lat: 46.5748, lng: 11.6711, desc: 'Return to Ortisei for lunch before the afternoon drive.', drive: 'Cable car down' },
      { time: '~18:00', name: 'Val di Funes — St Johann Viewpoint', type: 'Sunset — Optional', lat: 46.6367, lng: 11.7221, desc: 'The famous church-and-peaks viewpoint. Golden hour light on the Odle/Geisler group is extraordinary. Free photo spot available outside the paid area.', drive: '~20min from Ortisei', optional: true },
      { time: '~20:30', name: 'Return — Merano Airbnb', type: 'Back to base', lat: 46.67469, lng: 11.15881, desc: 'Return to Merano for dinner. ~1hr drive from Val di Funes / Ortisei.', drive: '~1hr from Ortisei' },
    ]
  },
  {
    id: 4, day: 'Thu', date: '10 Sept',
    title: 'Alpe di Siusi', subtitle: "Merano → Alpe di Siusi → Merano",
    stops: [
      { time: '~08:30', name: 'Drive to Alpe di Siusi', type: 'Base: Merano', lat: 46.5423, lng: 11.6169, desc: "~1hr drive from Merano. Europe's largest high-alpine meadow with views of the Sassolungo and Sciliar. Access by gondola or drive up early before road restrictions. Full morning of easy hiking.", drive: '~1hr from Merano' },
      { time: '~14:00', name: 'Alpe di Siusi — afternoon', type: 'Continue hiking or descend', lat: 46.5423, lng: 11.6169, desc: 'Linger for lunch at a mountain hut, or descend and take a slow drive back towards Merano.', drive: null },
      { time: 'Evening', name: 'Merano Airbnb', type: 'Final mountain night', lat: 46.67469, lng: 11.15881, desc: 'Return to Merano. Relax and dinner in town. Pack for Venice drive tomorrow.', drive: '~1hr from Alpe di Siusi' },
    ]
  },
  {
    id: 5, day: 'Fri', date: '11 Sept',
    title: 'Return Day', subtitle: 'Merano → Venice → London',
    stops: [
      { time: 'Morning', name: 'Merano — Depart', type: 'Early start', lat: 46.67469, lng: 11.15881, desc: 'Leave early enough to reach Venice comfortably. ~2.5hrs driving via A22 motorway.', drive: null },
      { time: '~10:30', name: 'Venice Marco Polo Airport', type: 'Return car & check in', lat: 45.5047, lng: 12.3466, desc: 'Return hire car. Check in for flight. Allow at least 2hrs before departure.', drive: '~2.5hrs from Merano' },
    ]
  },
];

// MAP
const map = L.map('map', { zoomControl: true }).setView([46.4, 11.8], 8);
L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  maxZoom: 17,
  attribution: '© OpenTopoMap contributors'
}).addTo(map);

let markers = [], polylines = [], airbnbMarkers = [], activeDay = null, activeStop = null;

// LEGEND
const legendEl = document.getElementById('legend-items');
DAYS.forEach(d => {
  legendEl.innerHTML += `<div class="legend-item">
    <div class="legend-dot" style="background:${DAY_COLORS[d.id]}"></div>
    <span>${d.day} · ${d.title}</span>
  </div>`;
});
legendEl.innerHTML += `<div class="legend-item" style="margin-top:0.4rem; padding-top:0.4rem; border-top:1px solid var(--mist)">
  <div class="legend-dot" style="background:var(--pine); border-radius:2px"></div>
  <span>Airbnb</span>
</div>`;

// SIDEBAR
const sb = document.getElementById('sidebar');
DAYS.forEach(d => {
  const group = document.createElement('div');
  group.className = 'day-group';
  group.id = `day-group-${d.id}`;

  const header = document.createElement('div');
  header.className = 'day-header';
  header.id = `day-header-${d.id}`;
  header.innerHTML = `
    <div class="day-dot" id="day-dot-${d.id}">${d.day}</div>
    <div>
      <span class="day-label">${d.date}</span>
      <span class="day-title">${d.title}</span>
      <span class="day-date">${d.subtitle}</span>
    </div>`;
  header.onclick = () => activateDay(d.id);

  const list = document.createElement('div');
  list.className = 'stops-list';
  list.id = `stops-list-${d.id}`;

  d.stops.forEach((s, i) => {
    const isAirbnb = s.address != null;
    const item = document.createElement('div');
    item.className = 'stop-item';
    item.id = `stop-item-${d.id}-${i}`;
    item.innerHTML = `
      <div class="stop-time">${s.time}</div>
      <div class="stop-info">
        <div class="stop-name">${s.name}${s.optional ? '<span class="stop-optional">optional</span>' : ''}</div>
        <div class="stop-type">${s.type}</div>
        ${s.drive ? `<div class="stop-drive">↳ ${s.drive}</div>` : ''}
        ${isAirbnb ? `<div class="stop-accommodation">🏠 Accommodation</div>` : ''}
      </div>`;
    item.onclick = (e) => { e.stopPropagation(); selectStop(d.id, i); };
    list.appendChild(item);
  });

  group.appendChild(header);
  group.appendChild(list);
  sb.appendChild(group);
});

// HELPERS
function makeCircleIcon(color, size, opacity) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="${color}" fill-opacity="${opacity}" stroke="white" stroke-width="2"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [size, size], iconAnchor: [size/2, size/2] });
}

function makeAirbnbIcon(label) {
  return L.divIcon({
    html: `<div class="airbnb-pin">🏠 ${label}</div>`,
    className: '',
    iconAnchor: [0, 20],
  });
}

function plotAll() {
  markers.forEach(m => map.removeLayer(m));
  polylines.forEach(p => map.removeLayer(p));
  markers = []; polylines = [];

  DAYS.forEach(d => {
    const color = DAY_COLORS[d.id];
    const dimmed = activeDay !== null && activeDay !== d.id;
    const isActive = activeDay === d.id;

    const latlngs = d.stops.map(s => [s.lat, s.lng]);
    const line = L.polyline(latlngs, {
      color, weight: isActive ? 3 : 1.5, opacity: dimmed ? 0.12 : 0.65,
    }).addTo(map);
    polylines.push(line);

    d.stops.forEach((s, i) => {
      const isAirbnb = s.address != null;
      const mColor = isAirbnb ? '#2d4a3e' : (s.optional ? '#c9a84c' : color);
      const size = isActive ? 18 : (isAirbnb ? 14 : 13);
      const opacity = dimmed ? 0.25 : 1;
      const m = L.marker([s.lat, s.lng], { icon: makeCircleIcon(mColor, size, opacity), zIndexOffset: isAirbnb ? 100 : 0 }).addTo(map);
      m.on('click', () => {
        if (activeDay !== d.id) activateDay(d.id);
        selectStop(d.id, i);
      });
      markers.push(m);
    });
  });
}

function plotAirbnbs() {
  AIRBNBS.forEach(a => {
    const label = a.id === 'airbnb1' ? 'Cortina' : 'Merano';
    const m = L.marker([a.lat, a.lng], { icon: makeAirbnbIcon(label), zIndexOffset: 200 }).addTo(map);
    m.on('click', () => showAirbnbInfo(a));
    airbnbMarkers.push(m);
  });
}

function showAirbnbInfo(a) {
  document.getElementById('infoDayLabel').textContent = 'Accommodation';
  document.getElementById('infoName').textContent = a.name;
  document.getElementById('infoTime').textContent = a.checkin + ' · ' + a.nights;
  document.getElementById('infoDesc').textContent = '';
  const addrEl = document.getElementById('infoAddress');
  addrEl.textContent = a.address;
  addrEl.style.display = 'block';
  document.getElementById('infoPanel').classList.add('visible');
}

function activateDay(dayId) {
  if (activeDay === dayId) { deactivateDay(dayId); return; }
  if (activeDay !== null) {
    document.getElementById(`day-header-${activeDay}`).classList.remove('active');
    document.getElementById(`stops-list-${activeDay}`).classList.remove('open');
  }
  activeDay = dayId;
  document.getElementById(`day-header-${dayId}`).classList.add('active');
  document.getElementById(`stops-list-${dayId}`).classList.add('open');
  plotAll();
  fitDay(dayId);
}

function deactivateDay(dayId) {
  document.getElementById(`day-header-${dayId}`).classList.remove('active');
  document.getElementById(`stops-list-${dayId}`).classList.remove('open');
  activeDay = null;
  plotAll();
  closeInfo();
}

function selectStop(dayId, stopIdx) {
  if (activeStop) {
    const [pd, ps] = activeStop;
    document.getElementById(`stop-item-${pd}-${ps}`)?.classList.remove('active');
  }
  activeStop = [dayId, stopIdx];
  document.getElementById(`stop-item-${dayId}-${stopIdx}`).classList.add('active');
  const stop = DAYS[dayId].stops[stopIdx];
  showStopInfo(DAYS[dayId], stop);
  map.setView([stop.lat, stop.lng], 13, { animate: true });
}

function showStopInfo(day, stop) {
  document.getElementById('infoDayLabel').textContent = `${day.day} · ${day.date}`;
  document.getElementById('infoName').textContent = stop.name;
  document.getElementById('infoTime').textContent = stop.time + (stop.drive ? ` · ${stop.drive}` : '');
  document.getElementById('infoDesc').textContent = stop.desc;
  const addrEl = document.getElementById('infoAddress');
  if (stop.address) {
    addrEl.style.whiteSpace = 'pre-line';
    addrEl.textContent = stop.address;
    addrEl.style.display = 'block';
  } else {
    addrEl.style.display = 'none';
  }
  document.getElementById('infoPanel').classList.add('visible');
}

function closeInfo() {
  document.getElementById('infoPanel').classList.remove('visible');
  if (activeStop) {
    const [pd, ps] = activeStop;
    document.getElementById(`stop-item-${pd}-${ps}`)?.classList.remove('active');
    activeStop = null;
  }
}

function fitDay(dayId) {
  const stops = DAYS[dayId].stops;
  const bounds = L.latLngBounds(stops.map(s => [s.lat, s.lng]));
  map.fitBounds(bounds, { padding: [50, 50] });
}

plotAll();
plotAirbnbs();
activateDay(0);
</script>
</body>
</html>
